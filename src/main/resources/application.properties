spring.application.name=atlas-monitor

# Atlas Admin API
atlas.base-url=https://cloud.mongodb.com/api/atlas/v2
atlas.public-key=${ATLAS_PUBLIC_KEY}
atlas.private-key=${ATLAS_PRIVATE_KEY}
atlas.group-id=${ATLAS_GROUP_ID}

# Jackson — serialize Instant as ISO-8601 strings
spring.jackson.serialization.write-dates-as-timestamps=false

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/atlas-monitor}

# Sync — common
atlas.sync.interval=PT1H

# Sync — slow queries
atlas.sync.slow-query-min-duration=PT1S
atlas.sync.slow-query-batch-window=PT6H
atlas.sync.slow-query-initial-lookback=P7D

# Sync — primary windows (OPCOUNTER metrics have ~90 day retention)
atlas.sync.primary-window-initial-lookback=P60D

# Sync — IOPS (metrics have ~90 day retention, sync PRIMARY at PT1H)
atlas.sync.iops-initial-lookback=P60D

# Anthropic API
anthropic.api-key=${ANTHROPIC_API_KEY}

# GitHub Code Search
github.token=${GITHUB_TOKEN:}
github.repositories=${GITHUB_REPOSITORIES:}
