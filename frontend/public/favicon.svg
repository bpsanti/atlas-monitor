<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Atlas holding the celestial sphere -->
  <!-- Body/torso -->
  <path d="M24 52 L28 38 L32 36 L36 38 L40 52" fill="#7c3aed" opacity="0.9"/>
  <!-- Arms raised holding sphere -->
  <path d="M22 42 L26 30 L28 26" stroke="#7c3aed" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M42 42 L38 30 L36 26" stroke="#7c3aed" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Legs -->
  <path d="M28 52 L26 62" stroke="#7c3aed" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M36 52 L38 62" stroke="#7c3aed" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="32" cy="32" r="3.5" fill="#a78bfa"/>
  <!-- Celestial sphere -->
  <circle cx="32" cy="16" r="13" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.9"/>
  <circle cx="32" cy="16" r="13" fill="#60a5fa" opacity="0.1"/>
  <!-- Sphere rings/orbits -->
  <ellipse cx="32" cy="16" rx="13" ry="5" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <ellipse cx="32" cy="16" rx="5" ry="13" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.5" transform="rotate(30 32 16)"/>
  <ellipse cx="32" cy="16" rx="5" ry="13" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.5" transform="rotate(-30 32 16)"/>
  <!-- Stars on sphere -->
  <circle cx="26" cy="10" r="1" fill="#facc15"/>
  <circle cx="38" cy="12" r="1.2" fill="#facc15"/>
  <circle cx="32" cy="7" r="1" fill="#facc15"/>
  <circle cx="28" cy="20" r="0.8" fill="#facc15"/>
  <circle cx="37" cy="22" r="0.8" fill="#facc15"/>
</svg>
